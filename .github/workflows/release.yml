name: Create Release

on:
  workflow_dispatch:
    inputs:
      version-bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch  # 1.0.1 -> 1.0.2
          - minor  # 1.0.2 -> 1.1.0
          - major  # 1.1.0 -> 2.0.0
        default: 'patch'
      release-notes:
        description: 'Brief release description (optional)'
        required: false
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'
      
      - name: Install dependencies
        run: |
          pip install toml
      
      - name: Get current version
        id: current-version
        run: |
          VERSION=$(python -c "import toml; print(toml.load('pyproject.toml')['project']['version'])")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Current version: $VERSION"
      
      - name: Calculate new version
        id: new-version
        run: |
          CURRENT="${{ steps.current-version.outputs.version }}"
          IFS='.' read -r -a VERSION_PARTS <<< "$CURRENT"
          MAJOR="${VERSION_PARTS[0]}"
          MINOR="${VERSION_PARTS[1]}"
          PATCH="${VERSION_PARTS[2]}"
          
          case "${{ github.event.inputs.version-bump }}" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac
          
          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "New version: $NEW_VERSION"
      
      - name: Update pyproject.toml
        run: |
          python << 'EOF'
          import toml
          
          # Read pyproject.toml
          with open('pyproject.toml', 'r') as f:
              config = toml.load(f)
          
          # Update version
          config['project']['version'] = '${{ steps.new-version.outputs.version }}'
          
          # Write back
          with open('pyproject.toml', 'w') as f:
              toml.dump(config, f)
          
          print(f"Updated pyproject.toml to version ${{ steps.new-version.outputs.version }}")
          EOF
      
      - name: Update CHANGELOG.md
        run: |
          DATE=$(date +%Y-%m-%d)
          
          # Replace [Unreleased] with new version and date
          sed -i "s/## \[Unreleased\]/## [Unreleased]\n\n## [${{ steps.new-version.outputs.version }}] - $DATE/" CHANGELOG.md
          
          # Update version comparison links at bottom
          sed -i "s|\[Unreleased\]:.*|[Unreleased]: https://github.com/spydisec/PDFtoOFX/compare/v${{ steps.new-version.outputs.version }}...HEAD\n[${{ steps.new-version.outputs.version }}]: https://github.com/spydisec/PDFtoOFX/compare/v${{ steps.current-version.outputs.version }}...v${{ steps.new-version.outputs.version }}|" CHANGELOG.md
          
          echo "Updated CHANGELOG.md with version ${{ steps.new-version.outputs.version }}"
      
      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml CHANGELOG.md
          git commit -m "chore: Release v${{ steps.new-version.outputs.version }}"
          git push origin main
      
      - name: Create Git Tag
        run: |
          git tag -a "v${{ steps.new-version.outputs.version }}" -m "Release v${{ steps.new-version.outputs.version }}
          
          ${{ github.event.inputs.release-notes }}"
          git push origin "v${{ steps.new-version.outputs.version }}"
      
      - name: Extract changelog for release
        id: changelog
        run: |
          # Extract section for this version from CHANGELOG.md
          awk '/## \[${{ steps.new-version.outputs.version }}\]/,/## \[/' CHANGELOG.md | sed '1d;$d' > release-notes.md
          
          # Add custom notes if provided
          if [ -n "${{ github.event.inputs.release-notes }}" ]; then
            echo -e "\n---\n\n${{ github.event.inputs.release-notes }}" >> release-notes.md
          fi
          
          cat release-notes.md
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.new-version.outputs.version }}
          name: Release v${{ steps.new-version.outputs.version }}
          body_path: release-notes.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Trigger Docker Build
        run: |
          echo "Git tag v${{ steps.new-version.outputs.version }} pushed."
          echo "Docker build workflow will be triggered automatically by the tag push."

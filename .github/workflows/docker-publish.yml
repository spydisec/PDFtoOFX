name: Build and Push Docker Image

on:
  # Trigger on version tags (e.g., v1.0.0, v1.2.3)
  push:
    tags:
      - 'v*.*.*'
  
  # Allow manual workflow dispatch
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., 1.0.0)'
        required: true
        default: '1.0.0'

# Required permissions for creating releases
permissions:
  contents: write
  packages: write

env:
  DOCKER_HUB_REPO: spydisec/anzplus-ofx-converter
  PYTHON_VERSION: '3.11'  # For running tests

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      
      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short
      
      - name: Check Python 3.14 compatibility (dry run)
        run: |
          echo "✅ Dependencies installed successfully with Python ${{ env.PYTHON_VERSION }}"
          echo "Note: Python 3.14 compatibility will be verified during Docker build"

  build-and-push:
    name: Build and Push Multi-Arch Docker Image
    needs: test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Extract version from tag
        id: extract_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            # Remove 'v' prefix from tag (e.g., v1.0.0 -> 1.0.0)
            VERSION=${GITHUB_REF#refs/tags/v}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"
      
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest
      
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_HUB_REPO }}
          tags: |
            type=semver,pattern={{version}},value=${{ steps.extract_version.outputs.version }}
            type=raw,value=latest
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.DOCKER_HUB_REPO }}:buildcache
          cache-to: type=registry,ref=${{ env.DOCKER_HUB_REPO }}:buildcache,mode=max
      
      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v4
        continue-on-error: true
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ env.DOCKER_HUB_REPO }}
          short-description: 'Convert ANZ Plus bank statement PDFs to OFX format for Actual Budget'
          readme-filepath: ./README.md
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          generate_release_notes: true
          body: |
            ## 🐳 Docker Image
            
            Multi-architecture Docker image available on Docker Hub:
            
            ```bash
            docker pull ${{ env.DOCKER_HUB_REPO }}:${{ steps.extract_version.outputs.version }}
            docker pull ${{ env.DOCKER_HUB_REPO }}:latest
            ```
            
            **Supported platforms:**
            - `linux/amd64` (x86_64)
            - `linux/arm64` (Apple Silicon, ARM servers)
            
            **Quick start:**
            ```bash
            docker run -d -p 8000:8000 ${{ env.DOCKER_HUB_REPO }}:${{ steps.extract_version.outputs.version }}
            ```
            
            Then open http://localhost:8000
            
            **Docker Hub:** https://hub.docker.com/r/${{ env.DOCKER_HUB_REPO }}
            
            ---
      
      - name: Summary
        run: |
          echo "## ✅ Build and Push Completed!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ steps.extract_version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Repository:** ${{ env.DOCKER_HUB_REPO }}" >> $GITHUB_STEP_SUMMARY
          echo "**Platforms:** linux/amd64, linux/arm64" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🐳 Pull the image:" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.DOCKER_HUB_REPO }}:${{ steps.extract_version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🌐 Docker Hub:" >> $GITHUB_STEP_SUMMARY
          echo "https://hub.docker.com/r/${{ env.DOCKER_HUB_REPO }}" >> $GITHUB_STEP_SUMMARY

name: Build and Push Docker Image

on:
  # Trigger on version tags (e.g., v1.0.0, v1.2.3)
  push:
    tags:
      - 'v*.*.*'
    branches:
      - main
    paths:
      - 'app/**'
      - 'requirements.*'
      - 'docker/Dockerfile'
      - 'run_web.py'
      - 'pyproject.toml'

  # Allow manual workflow dispatch (used by release.yml)
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., 1.0.0)'
        required: true
        default: '1.0.0'

# Cancel in-progress builds for the same ref
concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write

env:
  DOCKER_HUB_REPO: spydisec/anzplus-ofx-converter
  PYTHON_VERSION: '3.11'

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    # Skip tests for branch pushes — ci.yml already covers main pushes
    if: github.event_name != 'push' || startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short

  build-and-push:
    name: Build and Push Multi-Arch Docker Image
    needs: test
    # Always run even when test job is skipped (branch pushes)
    if: always() && (needs.test.result == 'success' || needs.test.result == 'skipped')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Determine build type and version
        id: build_info
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
            BUILD_TYPE="release"
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
            BUILD_TYPE="release"
          else
            VERSION="main"
            BUILD_TYPE="main"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "build_type=$BUILD_TYPE" >> $GITHUB_OUTPUT
          echo "Build type: $BUILD_TYPE, Version: $VERSION"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver-opts: |
            image=moby/buildkit:latest

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate Docker tags
        id: tags
        run: |
          REPO="${{ env.DOCKER_HUB_REPO }}"
          if [ "${{ steps.build_info.outputs.build_type }}" = "main" ]; then
            echo "tags=${REPO}:main" >> $GITHUB_OUTPUT
          else
            VERSION="${{ steps.build_info.outputs.version }}"
            echo "tags=${REPO}:${VERSION},${REPO}:latest" >> $GITHUB_OUTPUT
          fi

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=registry,ref=${{ env.DOCKER_HUB_REPO }}:buildcache
          cache-to: type=registry,ref=${{ env.DOCKER_HUB_REPO }}:buildcache,mode=max

      - name: Update Docker Hub description
        if: steps.build_info.outputs.build_type == 'release'
        uses: peter-evans/dockerhub-description@v5
        continue-on-error: true
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ env.DOCKER_HUB_REPO }}
          short-description: 'Convert ANZ Plus bank statement PDFs to OFX format for Actual Budget'
          readme-filepath: ./README.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/')
        with:
          generate_release_notes: true
          body: |
            ## Docker Image

            Multi-architecture Docker image available on Docker Hub:

            ```bash
            docker pull ${{ env.DOCKER_HUB_REPO }}:${{ steps.build_info.outputs.version }}
            docker pull ${{ env.DOCKER_HUB_REPO }}:latest
            ```

            **Supported platforms:**
            - `linux/amd64` (x86_64)
            - `linux/arm64` (Apple Silicon, ARM servers)

            **Quick start:**
            ```bash
            docker run -d -p 8000:8000 ${{ env.DOCKER_HUB_REPO }}:${{ steps.build_info.outputs.version }}
            ```

            Then open http://localhost:8000

            **Docker Hub:** https://hub.docker.com/r/${{ env.DOCKER_HUB_REPO }}

      - name: Summary
        run: |
          VERSION="${{ steps.build_info.outputs.version }}"
          BUILD_TYPE="${{ steps.build_info.outputs.build_type }}"
          echo "## Build and Push Completed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Type:** ${BUILD_TYPE}" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${VERSION}" >> $GITHUB_STEP_SUMMARY
          echo "**Repository:** ${{ env.DOCKER_HUB_REPO }}" >> $GITHUB_STEP_SUMMARY
          echo "**Platforms:** linux/amd64, linux/arm64" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Pull the image:" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.DOCKER_HUB_REPO }}:${VERSION}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

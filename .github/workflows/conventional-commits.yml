name: Conventional Commits Check

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

jobs:
  check-commit-messages:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Check Conventional Commits
        uses: webiny/action-conventional-commits@v1.3.0
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          allowed-commit-types: |
            feat
            fix
            docs
            chore
            style
            refactor
            perf
            test
            build
            ci
            revert

      - name: Comment on PR (if check fails)
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## ⚠️ Conventional Commits Check Failed
              
              Please ensure your commit messages follow the [Conventional Commits](https://www.conventionalcommits.org/) format:
              
              \`\`\`
              <type>: <description>
              
              [optional body]
              [optional footer]
              \`\`\`
              
              **Allowed types:**
              - \`feat:\` - New feature
              - \`fix:\` - Bug fix
              - \`docs:\` - Documentation changes
              - \`chore:\` - Maintenance tasks
              - \`style:\` - Code style changes (formatting)
              - \`refactor:\` - Code refactoring
              - \`perf:\` - Performance improvements
              - \`test:\` - Test changes
              - \`build:\` - Build system changes
              - \`ci:\` - CI/CD changes
              - \`revert:\` - Revert previous commit
              
              **Examples:**
              - \`feat: Add support for Westpac bank statements\`
              - \`fix: Correct MEMO field truncation issue\`
              - \`docs: Update README with installation steps\`
              - \`chore: Update dependencies\`
              `
            })

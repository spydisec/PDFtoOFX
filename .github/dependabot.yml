# Dependabot configuration for automated security updates
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
#
# NOTE: Python dependencies are managed via pip-tools (requirements.in -> requirements.txt)
#       Manual dependency updates should use `pip-compile --upgrade` workflow
#       Dependabot is disabled for pip to avoid conflicts with hash-pinned requirements

version: 2
updates:
  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    reviewers:
      - "spydisec"
    labels:
      - "dependencies"
      - "github-actions"

  # Docker base images
  - package-ecosystem: "docker"
    directory: "/docker"
    schedule:
      interval: "weekly"
    reviewers:
      - "spydisec"
    labels:
      - "dependencies"
      - "docker"
